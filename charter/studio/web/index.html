<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>charter studio — beat grid</title>
  <link rel="stylesheet" href="/styles.css" />
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
</head>
<body>
  <div id="app">
    <aside id="panel">
      <header>
        <div class="brand">charter <span>studio</span></div>
        <div id="songinfo" class="songinfo">loading…</div>
      </header>

      <section class="group">
        <h3>Beat grid <small>the foundation</small></h3>
        <div class="readout">
          <div><b id="bpmOut">—</b><span>median BPM</span></div>
          <div><b id="beatsOut">—</b><span>beats</span></div>
          <div><b id="barsOut">—</b><span>bars</span></div>
        </div>
        <label>Tempo
          <select id="tempo_mult">
            <option value="0.5">×½ (halve)</option>
            <option value="1" selected>×1 (as detected)</option>
            <option value="2">×2 (double)</option>
          </select>
        </label>
        <div class="hint">If the click drifts off the beat or the BPM looks halved/doubled, fix it here first — everything snaps to this grid.</div>
        <label>Tempo hint (BPM, optional) <output id="hintOut">auto</output>
          <input id="tempo_hint" type="range" min="0" max="260" value="0" step="1" />
        </label>
        <label>Beats per bar
          <select id="beats_per_bar">
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
          </select>
        </label>
        <div class="row">
          <button id="phaseShift" class="ghost">⇄ shift downbeat</button>
          <button id="reanalyze" class="primary">↻ Re-analyze</button>
        </div>
      </section>

      <section class="group">
        <h3>Sections <small id="sectionCount"></small></h3>
        <div id="sectionList" class="sectionList"></div>
      </section>

      <div id="diag" class="diag"></div>
    </aside>

    <main id="stage">
      <div id="highway"></div>
      <div id="transport">
        <button id="play" class="primary">▶ Play</button>
        <label class="chk"><input id="click" type="checkbox" checked /> 🔊 metronome</label>
        <span id="clock" class="clock">0:00.0</span>
        <span id="status" class="status"></span>
      </div>
      <div id="timeline">
        <canvas id="tl"></canvas>
      </div>
    </main>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
